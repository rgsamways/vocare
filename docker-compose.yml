services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vocare
      POSTGRES_PASSWORD: vocare
      POSTGRES_DB: vocare
    ports:
      - "5434:5432"
    volumes:
      - vocare-postgres-data:/var/lib/postgresql/data

volumes:
  vocare-postgres-data:
